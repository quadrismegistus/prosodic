<div class="info">Parsed {{ num_lines }} lines in {{ "%.2f"|format(elapsed) }}s</div>
<table>
<thead>
    <tr><th>Line</th><th>Parse</th><th>Meter</th><th>Viols</th><th>Ambig</th></tr>
</thead>
<tbody>
{% for r in rows %}
<tr class="{{ 'best' if r.rank == 1 else 'other' }}">
    <td>{{ r.line_num }}</td>
    <td class="parse-text">{{ r.parse_html | safe }}</td>
    <td class="stat">{{ r.meter_str }}</td>
    <td class="stat">{{ r.score }}</td>
    <td class="stat">{{ r.num_unbounded if r.rank == 1 else '' }}</td>
</tr>
{% endfor %}
</tbody>
</table>
