<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prosodic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; font-size: 16px; background: #fafafa; color: #222; }

        /* layout */
        .app { display: flex; flex-direction: column; min-height: 100vh; }
        .header { padding: 1rem; text-align: center; border-bottom: 1px solid #ddd; background: #fff; }
        .header h1 { font-size: 1.4rem; font-weight: normal; }
        .header h1 a { color: inherit; text-decoration: none; }
        .header .subtitle { font-size: .85rem; color: #666; margin-top: .3rem; }

        .main { display: flex; flex: 1; }
        .sidebar { width: 360px; min-width: 300px; border-right: 1px solid #ddd; background: #f5f5f5;
                   overflow-y: auto; padding: 1rem; flex-shrink: 0; }
        .content { flex: 1; padding: 1rem; overflow-x: auto; }

        /* mobile: stack */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #ddd;
                       max-height: none; }
            .content { padding: .5rem; }
        }

        /* input */
        textarea { width: 100%; min-height: 200px; font-family: Georgia, serif; font-size: 15px;
                   line-height: 1.6; padding: .75rem; border: 1px solid #ccc; border-radius: 4px;
                   resize: vertical; }
        .parse-btn { width: 100%; padding: .75rem; font-family: Georgia, serif; font-size: 1.1rem;
                     background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer;
                     margin: .75rem 0; }
        .parse-btn:hover { background: #555; }
        .parse-btn:disabled { background: #999; cursor: default; }

        /* config */
        .config-section { margin-top: 1rem; }
        .config-title { font-size: .9rem; font-weight: normal; background: #e8e8e8; padding: .4rem .6rem;
                        border-radius: 3px; margin-bottom: .5rem; }
        .config-row { display: flex; justify-content: space-between; align-items: center;
                      padding: .4rem .6rem; border-bottom: 1px solid #eee; font-size: .9rem; }
        .config-row:last-child { border-bottom: none; }
        .config-row label { flex: 1; }
        .config-row .desc { font-size: .75rem; color: #888; display: block; }
        .config-row select, .config-row input[type=checkbox] { flex-shrink: 0; }

        /* toggle */
        .toggle-row { display: flex; gap: .5rem; margin-bottom: .75rem; align-items: center; }
        .toggle-btn { padding: .3rem .7rem; font-size: .8rem; border: 1px solid #ccc; border-radius: 3px;
                      background: #fff; cursor: pointer; font-family: Georgia, serif; }
        .toggle-btn.active { background: #333; color: #fff; border-color: #333; }

        /* results table */
        .results { width: 100%; }
        .results table { width: 100%; border-collapse: collapse; font-size: .95rem; }
        .results th { text-align: left; padding: .5rem; border-bottom: 2px solid #ccc; font-weight: normal;
                      font-size: .8rem; color: #666; white-space: nowrap; }
        .results td { padding: .4rem .5rem; border-bottom: 1px solid #eee; vertical-align: top; }
        .results tr.best td { }
        .results tr.other td { opacity: .35; }
        .results tr.other:hover td { opacity: .8; }
        .results tr.hidden { display: none; }

        /* parse rendering */
        .parse-text { line-height: 2.2em; letter-spacing: .05em; white-space: nowrap; }
        .mtr_s { text-decoration: overline; }
        .str_s { font-weight: 600; }
        .viol_y { color: #e03030; text-decoration-color: #e03030; cursor: pointer; position: relative; }
        .viol_y .tip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
                       background: #333; color: #fff; padding: .2rem .5rem; border-radius: 3px;
                       font-size: .75rem; white-space: nowrap; z-index: 10; font-weight: normal;
                       font-family: monospace; pointer-events: none; }
        .viol_y:hover .tip, .viol_y:active .tip, .viol_y.touched .tip { display: block; }

        /* progress */
        .progress-bar { height: 3px; background: #333; transition: width .2s; position: fixed;
                        top: 0; left: 0; z-index: 100; }

        /* legend */
        .legend { font-size: .8rem; color: #888; padding: .5rem 0; }
        .legend .mtr_s { color: #222; }
        .legend .str_s { color: #222; }
        .legend .viol_y { color: #e03030; }

        /* stats row */
        .stat { font-size: .75rem; color: #888; font-family: monospace; }

        /* empty state */
        .empty { color: #aaa; text-align: center; padding: 3rem; font-style: italic; }
        .hidden { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
        integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA=="
        crossorigin="anonymous"></script>
</head>
<body>
<div class="app">
    <div class="progress-bar" id="progress" style="width:0%"></div>

    <div class="header">
        <h1><a href="https://github.com/quadrismegistus/prosodic">Prosodic</a> <span style="font-size:.8em;color:#888">[prə.'sɑ.dɪk]</span></h1>
        <div class="subtitle">A metrical parser for English and Finnish</div>
    </div>

    <div class="main">
        <div class="sidebar">
            <form id="inputform" onsubmit="return false;">
                <textarea id="inputtext" name="text">From fairest creatures we desire increase,
That thereby beauty's rose might never die,
But as the riper should by time decease,
His tender heir might bear his memory:
But thou, contracted to thine own bright eyes,
Feed'st thy light'st flame with self-substantial fuel,
Making a famine where abundance lies,
Thyself thy foe, to thy sweet self too cruel.
Thou that art now the world's fresh ornament
And only herald to the gaudy spring,
Within thine own bud buriest thy content
And, tender churl, makest waste in niggarding.
Pity the world, or else this glutton be,
To eat the world's due, by the grave and thee.</textarea>

                <button class="parse-btn" id="parsebtn" type="button">Parse</button>

                <button class="toggle-btn" style="width:100%;margin:.5rem 0;padding:.5rem;font-size:.9rem;"
                        onclick="document.getElementById('meter-config').classList.toggle('hidden')">
                    Configure Meter
                </button>

                <div id="meter-config" class="hidden">
                <div class="config-section">
                    <div class="config-title">Constraints</div>
                    {% for cname in all_constraints %}
                    <div class="config-row">
                        <label>*{{cname}}<span class="desc">{{constraint_descs[cname]}}</span></label>
                        <input type="checkbox" name="*{{cname}}" value="1" {% if cname in constraints %}checked{%endif%}>
                    </div>
                    {% endfor %}
                </div>

                <div class="config-section">
                    <div class="config-title">Position sizes</div>
                    <div class="config-row">
                        <label>max_w <span class="desc">{{constraint_descs['max_w']}}</span></label>
                        <select name="max_w">
                            {% for n in range(1,6) %}
                            <option value="{{n}}" {% if max_w==n %}selected{%endif%}>{{n}}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="config-row">
                        <label>max_s <span class="desc">{{constraint_descs['max_s']}}</span></label>
                        <select name="max_s">
                            {% for n in range(1,6) %}
                            <option value="{{n}}" {% if max_s==n %}selected{%endif%}>{{n}}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-title">Options</div>
                    <div class="config-row">
                        <label>resolve_optionality <span class="desc">{{constraint_descs['resolve_optionality']}}</span></label>
                        <input type="checkbox" name="resolve_optionality" value="1" {%if resolve_optionality %}checked{%endif%}>
                    </div>
                </div>
                </div><!-- /meter-config -->
            </form>
        </div>

        <div class="content">
            <div class="toggle-row">
                <button class="toggle-btn active" id="btn-best" onclick="toggleView('best')">Best only</button>
                <button class="toggle-btn" id="btn-unbounded" onclick="toggleView('unbounded')">All unbounded</button>
                <span class="legend" style="margin-left:auto;">
                    <span class="mtr_s">over</span>line = strong &nbsp;
                    <span class="str_s">bold</span> = stressed &nbsp;
                    <span class="viol_y">red</span> = violation
                </span>
            </div>
            <div class="results" id="results">
                <div class="empty" id="empty-msg">Paste text and hit Parse</div>
            </div>
        </div>
    </div>
</div>

<script>
var viewMode = 'best';
var allRows = [];
var socket = io();
var startedAt = 0;

function toggleView(mode) {
    viewMode = mode;
    document.getElementById('btn-best').classList.toggle('active', mode === 'best');
    document.getElementById('btn-unbounded').classList.toggle('active', mode === 'unbounded');
    renderTable();
}

function renderTable() {
    var container = document.getElementById('results');
    if (!allRows.length) {
        container.innerHTML = '<div class="empty">Paste text and hit Parse</div>';
        return;
    }

    var html = '<table><thead><tr><th>Line</th><th>Parse</th><th>Meter</th><th>Viols</th><th>Ambig</th></tr></thead><tbody>';
    for (var i = 0; i < allRows.length; i++) {
        var r = allRows[i];
        var isBest = r.rank === 1;
        var show = viewMode === 'unbounded' || isBest;
        var cls = isBest ? 'best' : 'other';
        if (!show) cls += ' hidden';
        html += '<tr class="' + cls + '">';
        html += '<td>' + r.line_num + '</td>';
        html += '<td class="parse-text">' + r.parse_html + '</td>';
        html += '<td class="stat">' + r.meter_str + '</td>';
        html += '<td class="stat">' + r.score + '</td>';
        html += '<td class="stat">' + (isBest ? r.num_unbounded : '') + '</td>';
        html += '</tr>';
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

document.getElementById('parsebtn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Parsing...';
    allRows = [];
    renderTable();
    startedAt = Date.now() / 1000;

    var data = [];
    var form = document.getElementById('inputform');
    var textarea = form.querySelector('textarea');
    data.push({name: textarea.name, value: textarea.value});

    form.querySelectorAll('select').forEach(function(el) {
        data.push({name: el.name, value: el.value});
    });
    form.querySelectorAll('input[type=checkbox]').forEach(function(el) {
        if (el.checked) data.push({name: el.name, value: el.value});
    });

    socket.emit('parse', JSON.stringify(data));
});

socket.on('parse_result', function(json_str) {
    var data_l = JSON.parse(json_str);
    for (var i = 0; i < data_l.length; i++) {
        allRows.push(data_l[i]);
    }
    renderTable();

    // progress
    if (data_l.length) {
        var d = data_l[0];
        var pct = Math.round(d.progress * 100);
        document.getElementById('progress').style.width = pct + '%';
        var btn = document.getElementById('parsebtn');
        var elapsed = Math.round(Date.now()/1000 - startedAt);
        btn.textContent = 'Parsing... ' + d.numdone + '/' + d.numlines + ' (' + elapsed + 's)';
    }
});

socket.on('parse_done', function(d) {
    document.getElementById('parsebtn').disabled = false;
    document.getElementById('parsebtn').textContent = 'Parse';
    document.getElementById('progress').style.width = '0%';
});

// mobile touch tooltips
document.addEventListener('touchstart', function(e) {
    // clear previous
    document.querySelectorAll('.viol_y.touched').forEach(function(el) { el.classList.remove('touched'); });
    if (e.target.closest('.viol_y')) {
        e.target.closest('.viol_y').classList.add('touched');
    }
});

// auto-parse on load
setTimeout(function() { document.getElementById('parsebtn').click(); }, 300);
</script>
</body>
</html>
