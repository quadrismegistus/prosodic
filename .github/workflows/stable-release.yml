name: "stable-release"

on:
  push:
    branches:
      - "main"
      - "master"

jobs:
  tests:
    uses: "./.github/workflows/unit-tests.yml"  # use the callable tests job to run tests

  pre-release:
    name: "GitHub Release"
    needs: [tests]
    runs-on: "ubuntu-latest"
    steps:
      - name: "Releasing"
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "stable"
          prerelease: false
          title: "Stable Build"

  pypi-release:
    name: "PyPI Release"
    needs: [tests, pre-release]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m build
          twine upload --skip-existing dist/*

  deploy:
    name: "Deploy to prosodic.app"
    needs: [tests]
    runs-on: "ubuntu-latest"
    steps:
      - name: SSH and update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/prosodic/repo
            sudo -u prosodic git fetch origin
            sudo -u prosodic git checkout master
            sudo -u prosodic git pull origin master
            sudo -u prosodic /opt/prosodic/.venv/bin/pip install -e . --quiet
            cd prosodic/web/frontend
            sudo -u prosodic npm install --no-audit --no-fund --silent
            sudo -u prosodic npm run build
            systemctl restart prosodic
            sleep 3
            curl -f -s -o /dev/null http://127.0.0.1:8181/ && echo "health check: OK"