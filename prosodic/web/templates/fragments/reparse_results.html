<div class="info">Re-parsed {{ rows|length }} lines with learned weights in {{ "%.2f"|format(elapsed) }}s</div>
{% if rows %}
<table>
<thead>
    <tr><th>Line</th><th>Text</th><th>Meter</th><th>Score</th></tr>
</thead>
<tbody>
{% for r in rows %}
<tr>
    <td>{{ r.line_num }}</td>
    <td>{{ r.line_txt }}</td>
    <td class="stat">{{ r.meter_str }}</td>
    <td class="stat">{{ r.score }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% else %}
<div class="empty">No results</div>
{% endif %}
